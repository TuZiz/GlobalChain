  "K":
    mats: CHEST
    name: "<gradient:#67E8F9:#C084FC><bold>✦ 邮箱说明 ✦</bold></gradient>"
    lore:
      - ""
      - " <#C084FC>▍ </#C084FC><#F8FAFC><bold>系统机制</bold></#F8FAFC>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>购买成功、下架返还、过期退回都会进入这里</#E2E8F0>"
