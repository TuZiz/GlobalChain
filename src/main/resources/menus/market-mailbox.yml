    lore:
      - ""
      - " <#38BDF8>▍ </#38BDF8><#F8FAFC><bold>当前看板</bold></#F8FAFC>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>当前页数：<#A5F3FC><page></#A5F3FC> / <#A5F3FC><pages></#A5F3FC></#E2E8F0>"
