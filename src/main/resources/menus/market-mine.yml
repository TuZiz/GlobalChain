Title: "<gradient:#FACC15:#FB7185><bold>✦ 我的在售 ✦</bold></gradient>"

# 💡 优化后的布局布局：
# 顶部：页签、上架（居中）、工具组（刷新/分类/搜索）
# 底部：翻页（左右角）、余额、编辑说明、状态、退出（居中）
Shape:
  - "E#GFIR#$T"
  - "#XXXXXXX#"
  - "#XXXXXXX#"
  - "#XXXXXXX#"
  - "#XXXXXXX#"
  - "<#SBC###>"

BUTTONS:
  "#":
    mats: GRAY_STAINED_GLASS_PANE
    name: " "

  "G":
    mats: COMPASS
    name: "<gradient:#67E8F9:#58A6FF><bold>✦ 全服市场 ✦</bold></gradient>"
    lore:
      - ""
      - " <#94A3B8>▪</#94A3B8> <#E2E8F0>返回全服交易主看板</#E2E8F0>"
      - ""
      - " <#38BDF8>▶</#38BDF8> <#F8FAFC>点击切换</#F8FAFC>"
    click:
      - "menu: market-global"

  "M":
    mats: CHEST
    glow: true
    name: "<gradient:#FACC15:#FB7185><bold>✦ 我的在售 ✦</bold></gradient>"
    lore:
      - ""
      - " <#94A3B8>▪</#94A3B8> <#E2E8F0>查看并编辑自己当前上架的商品</#E2E8F0>"
      - ""
      - " <#FACC15>▶</#FACC15> <#F8FAFC>当前所在页签</#F8FAFC>"
    click:
      - "internal: open_mine"

  "B":
    mats: ENDER_CHEST
    name: "<gradient:#C084FC:#F9A8D4><bold>✦ 待领取箱 ✦</bold></gradient>"
    lore:
      - ""
      - " <#94A3B8>▪</#94A3B8> <#E2E8F0>领取购买、下架或过期返还的物品</#E2E8F0>"
      - ""
      - " <#38BDF8>▶</#38BDF8> <#F8FAFC>点击切换</#F8FAFC>"
    click:
      - "menu: market-mailbox"

  "E":
    mats: SUNFLOWER
    name: "<gradient:#FACC15:#FB923C><bold>✦ 刷新列表 ✦</bold></gradient>"
    lore:
      - ""
      - " <#94A3B8>▪</#94A3B8> <#E2E8F0>重新读取最新上架状态</#E2E8F0>"
      - ""
      - " <#FACC15>▶</#FACC15> <#F8FAFC>点击刷新数据</#F8FAFC>"
    click:
      - "internal: refresh"

  "S":
    mats: EMERALD
    glow: true
    name: "<gradient:#43E97B:#38F9D7><bold>✦ 出售主手物品 ✦</bold></gradient>"
    lore:
      - ""
      - " <#4ADE80>▍ </#4ADE80><#F8FAFC><bold>快捷上架</bold></#F8FAFC>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>进入确认页设置价格并完成上架</#E2E8F0>"
      - ""
      - " <#4ADE80>▶</#4ADE80> <#F8FAFC>点击进入上架确认页</#F8FAFC>"
    click:
      - "internal: open_sell_confirm"

  "$":
    mats: GOLD_INGOT
    name: "<gradient:#FACC15:#FDE68A><bold>✦ 钱包余额 ✦</bold></gradient>"
    lore:
      - ""
      - " <#94A3B8>▪</#94A3B8> <#E2E8F0>当前余额：<#FDE047><balance></#FDE047></#E2E8F0>"

  "C":
    mats: OAK_DOOR
    name: "<gradient:#94A3B8:#CBD5E1><bold>✦ 关闭界面 ✦</bold></gradient>"
    click:
      - "close"

  "X":
    dynamic-role: "listing-entry"
    lore:
      - ""
      - " <#38BDF8>▍ </#38BDF8><#F8FAFC><bold>商品参数</bold></#F8FAFC>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>商品类型：<#A5F3FC><type></#A5F3FC></#E2E8F0>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>商品数量：<#86EFAC><amount></#86EFAC> <#94A3B8>个</#94A3B8>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>商品编号：<#64748B><id></#64748B>"
      - ""
      - " <#FACC15>▍ </#FACC15><#F8FAFC><bold>财务状态</bold></#F8FAFC>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>当前售价：<#FACC15><price> <symbol></#FACC15>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>单件零售：<#FACC15><retailprice> <symbol></#FACC15>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>剩余时间：<#F472B6><expireTimeLeft></#F472B6>"
      - ""
      - " <#FACC15>▶</#FACC15> <#F8FAFC>点击进入编辑页面</#F8FAFC>"
    click:
      - "internal: edit_entry"

  "T":
    mats: BOOK
    name: "<gradient:#67E8F9:#A5F3FC><bold>✦ 我的分类 ✦</bold></gradient>"
    lore:
      - ""
      - " <#94A3B8>▪</#94A3B8> <#E2E8F0>当前分类：<#F472B6><filter></#F472B6></#E2E8F0>"
      - ""
      - " <#38BDF8>▶</#38BDF8> <#F8FAFC>点击进行分类筛选</#F8FAFC>"
    click:
      - "internal: open_filter_menu"

  "<":
    mats: ARROW
    name: "<gradient:#67E8F9:#A5F3FC><bold>« 上一页</bold></gradient>"
    click:
      - "internal: prev_page"

  "I":
    mats: OAK_SIGN
    name: "<gradient:#E2E8F0:#F8FAFC><bold>✦ 在售总览 ✦</bold></gradient>"
    lore:
      - ""
      - " <#38BDF8>▍ </#38BDF8><#F8FAFC><bold>数据看板</bold></#F8FAFC>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>当前页数：<#A5F3FC><page></#A5F3FC> / <#A5F3FC><pages></#A5F3FC></#E2E8F0>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>商品总数：<#FDE047><total></#FDE047></#E2E8F0>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>搜索词条：<#86EFAC><search></#86EFAC></#E2E8F0>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>当前分类：<#F472B6><filter></#F472B6></#E2E8F0>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>当前排序：<#FACC15><sort></#FACC15></#E2E8F0>"
      - ""
      - " <#4ADE80>▍ </#4ADE80><#F8FAFC><bold>编辑规则</bold></#F8FAFC>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>点击任意商品可进入编辑页</#E2E8F0>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>编辑页支持改价与下架返还到待领取箱</#E2E8F0>"

  ">":
    mats: ARROW
    name: "<gradient:#67E8F9:#A5F3FC><bold>下一页 »</bold></gradient>"
    click:
      - "internal: next_page"

  "F":
    mats: NAME_TAG
    name: "<gradient:#38BDF8:#A5F3FC><bold>✦ 搜索我的商品 ✦</bold></gradient>"
    lore:
      - ""
      - " <#94A3B8>▪</#94A3B8> <#E2E8F0>当前关键词：<#A5F3FC><search></#A5F3FC></#E2E8F0>"
      - ""
      - " <#38BDF8>▶</#38BDF8> <#F8FAFC>点击输入新关键词</#F8FAFC>"
    click:
      - "internal: prompt_search"

  "R":
    mats: HOPPER
    name: "<gradient:#F59E0B:#FDE68A><bold>✦ 排序目录 ✦</bold></gradient>"
    lore:
      - ""
      - " <#94A3B8>▪</#94A3B8> <#E2E8F0>当前排序：<#FACC15><sort></#FACC15></#E2E8F0>"
      - ""
      - " <#F59E0B>▶</#F59E0B> <#F8FAFC>点击进入排序子页面</#F8FAFC>"
    click:
      - "internal: open_sort_menu"

  "H":
    mats: WRITABLE_BOOK
    name: "<gradient:#E2E8F0:#F8FAFC><bold>✦ 编辑说明 ✦</bold></gradient>"
    lore:
      - ""
      - " <#4ADE80>▍ </#4ADE80><#F8FAFC><bold>操作规则</bold></#F8FAFC>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>点击任意商品可进入编辑页</#E2E8F0>"
