Title: "<gradient:#58A6FF:#43E97B><bold>✦ 全球市场 ✦</bold></gradient>"

Shape:
  - "E#MFIR#$T"
  - "#XXXXXXX#"
  - "#XXXXXXX#"
  - "#XXXXXXX#"
  - "#XXXXXXX#"
  - "<#SBC###>"
BUTTONS:
  "#":
    mats: GRAY_STAINED_GLASS_PANE
    name: " "

  "G":
    mats: COMPASS
    glow: true
    name: "<gradient:#67E8F9:#58A6FF><bold>✦ 全服市场 ✦</bold></gradient>"
    lore:
      - ""
      - " <#94A3B8>▪</#94A3B8> <#E2E8F0>浏览跨服同步的全服交易列表</#E2E8F0>"
      - ""
      - " <#38BDF8>▶</#38BDF8> <#F8FAFC>当前所在页签</#F8FAFC>"
