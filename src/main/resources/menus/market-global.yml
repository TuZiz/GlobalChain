      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>剩余时间：<#F472B6><expireTimeLeft></#F472B6>"
      - "   <#94A3B8>▪</#94A3B8> <#E2E8F0>商品编号：<#64748B><id></#64748B>"
