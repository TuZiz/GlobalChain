      - ""
      - " <#94A3B8>▪</#94A3B8> <#E2E8F0>查看并管理自己的上架商品</#E2E8F0>"
      - ""
      - " <#38BDF8>▶</#38BDF8> <#F8FAFC>点击切换</#F8FAFC>"
    click:
      - "menu: market-mine"

  "B":
    mats: ENDER_CHEST
